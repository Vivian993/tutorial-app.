<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⭐ 終極小孩任務與高效激勵表</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#2D3748;--soft:#718096;--coral:#FF6B6B;--grass:#4CAF7D;--sun:#FFB800;--r:16px;--shadow:0 4px 20px rgba(0,0,0,.10);}
html{font-size:118%;}
body{font-family:'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif;background:linear-gradient(160deg,#E8F4FD 0%,#FFF9E6 100%);min-height:100vh;color:var(--ink);padding-bottom:60px;}
.app-header{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:12px 20px 10px;text-align:center;box-shadow:0 3px 15px rgba(102,126,234,.4);position:sticky;top:0;z-index:200;}
.app-header h1{font-size:1.4rem;font-weight:900;letter-spacing:.06em;margin-bottom:1px;}
.app-header p{font-size:.72rem;opacity:.85;}
.date-bar{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;background:rgba(255,255,255,.8);backdrop-filter:blur(6px);border-bottom:1px solid rgba(0,0,0,.07);font-size:.76rem;color:var(--soft);}
.backup-bar{display:flex;align-items:center;gap:7px;flex-wrap:wrap;padding:8px 13px;background:linear-gradient(90deg,#f0f4ff,#fdf6ff);border-bottom:1px solid #e0e7ff;font-size:.74rem;}
.backup-bar-label{color:var(--soft);font-weight:700;}
.bk-btn{border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-size:.74rem;font-weight:700;padding:6px 11px;transition:opacity .2s;}
.bk-btn:hover{opacity:.82;}
.bk-btn.export{background:#667eea;color:#fff;}.bk-btn.import{background:#27ae60;color:#fff;}.bk-btn.danger{background:#e74c3c;color:#fff;}
.bk-btn.purple{background:#764ba2;color:#fff;}.bk-btn.orange{background:#f39c12;color:#fff;}
.bk-time{margin-left:auto;color:#a0aec0;font-size:.68rem;font-style:italic;}
#fileInput{display:none;}

.utility-panel{background:#fff;margin:10px 12px 0;padding:10px 14px;border-radius:12px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:8px;}
.cal-row{display:flex;align-items:center;gap:9px;}
.cal-btn{flex:1;display:flex;align-items:center;gap:8px;border:1.5px solid #cbd5e0;background:#fafbff;padding:8px 12px;border-radius:10px;cursor:pointer;font-family:inherit;text-align:left;}
.cal-btn:hover{background:#edf2f7;}
.cal-btn .cd{font-size:1.4rem;}
.cal-btn .ct{font-size:.82rem;font-weight:700;color:var(--ink);}
.cal-btn .cs{font-size:.66rem;color:var(--soft);}
.yell-btn{background:linear-gradient(135deg,#e53e3e,#dd6b20);color:#fff;border:none;padding:8px 12px;border-radius:8px;font-size:.78rem;font-weight:900;cursor:pointer;box-shadow:0 2px 8px rgba(229,62,62,.3);width:100%;text-align:center;}
.yell-btn:hover{opacity:.9;}
.pts-adj-btn{background:#F7F8FC;border:1.5px solid #E2E8F0;color:var(--ink);padding:8px 12px;border-radius:8px;font-family:inherit;font-size:.78rem;font-weight:700;cursor:pointer;width:100%;}
.pts-adj-btn:hover{background:#edf2f7;}

.tab-bar{display:flex;background:#fff;border-bottom:2px solid #EEF0F4;position:sticky;top:58px;z-index:190;overflow-x:auto;}
.tab-btn{flex:1;min-width:90px;padding:10px 6px 8px;border:none;background:none;cursor:pointer;font-family:inherit;font-weight:700;color:var(--soft);border-bottom:3px solid transparent;transition:all .2s;}
.tab-btn.active{color:#667eea;border-bottom-color:#667eea;}
.tab-kid-name{display:block;font-size:.78rem;font-weight:900;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tab-pts{display:inline-block;min-width:32px;height:21px;border-radius:10px;font-size:.76rem;font-weight:900;line-height:21px;text-align:center;padding:0 7px;margin-top:3px;background:#EEF0F4;color:var(--soft);transition:all .3s;}
.tab-pts.pos{background:#E8F8EF;color:#27ae60;}.tab-pts.m10{background:linear-gradient(135deg,#f6d365,#fda085);color:#fff;}.tab-pts.m20{background:linear-gradient(135deg,#f093fb,#f5576c);color:#fff;animation:pulse 1s infinite;}.tab-pts.m50{background:linear-gradient(135deg,#4facfe,#00f2fe);color:#fff;animation:pulse 1s infinite;}.tab-pts.neg{background:#FFF0F0;color:var(--coral);}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.15);}}

.inner-nav{display:flex;gap:0;background:#F7F8FC;border-radius:12px;padding:4px;margin-bottom:12px;overflow-x:auto;}
.inner-tab{flex:1;min-width:55px;padding:7px 4px;border:none;background:none;cursor:pointer;font-family:inherit;font-size:.72rem;font-weight:700;color:var(--soft);border-radius:9px;transition:all .2s;white-space:nowrap;}
.inner-tab.active{background:#fff;color:#667eea;box-shadow:0 2px 8px rgba(0,0,0,.09);}
.page{display:none;padding:12px 12px 90px;max-width:720px;margin:0 auto;}
.page.active{display:block;}
.pts-summary{background:linear-gradient(135deg,#667eea,#764ba2);border-radius:var(--r);padding:16px 20px;color:#fff;margin-bottom:12px;box-shadow:0 4px 20px rgba(102,126,234,.35);}
.kid-header-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;}
.kid-name-lg{font-size:1.7rem;font-weight:900;display:flex;align-items:center;gap:6px;line-height:1.15;}
.kid-pts-lg{font-size:2.5rem;font-weight:900;line-height:1;text-align:right;white-space:nowrap;}
.util-chip-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.util-chip{background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.4);color:#fff;border-radius:14px;padding:7px 13px;font-size:.78rem;font-weight:700;cursor:pointer;font-family:inherit;}
.util-chip:hover{background:rgba(255,255,255,.32);}
.quick-adj-row{display:flex;gap:6px;flex-wrap:wrap;}
.quick-adj-btn{flex:1;min-width:42px;padding:9px 0;border-radius:10px;border:none;font-weight:900;font-size:.92rem;cursor:pointer;font-family:inherit;}
.quick-adj-btn.plus{background:#E8F8EF;color:#1e824c;}
.quick-adj-btn.minus{background:#FFF0F0;color:#c0392b;}
.pts-name-big{font-size:1.4rem;font-weight:900;margin-bottom:3px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.pts-number{font-size:3.4rem;font-weight:900;line-height:1;margin-bottom:6px;}
.pts-row{display:flex;gap:12px;flex-wrap:wrap;}
.pts-item{font-size:.76rem;opacity:.9;}.pts-item strong{font-weight:700;}

.milestone-banner{border-radius:var(--r);padding:10px 13px;margin-bottom:11px;display:flex;align-items:center;gap:9px;cursor:pointer;font-weight:700;font-size:.86rem;transition:transform .15s;box-shadow:var(--shadow);}
.milestone-banner:hover{transform:translateY(-2px);}
.milestone-banner.m10{background:linear-gradient(135deg,#f6d365,#fda085);color:#5d3a00;}
.milestone-banner.m20{background:linear-gradient(135deg,#f093fb,#f5576c);color:#fff;}
.milestone-banner.m50{background:linear-gradient(135deg,#4facfe,#00f2fe);color:#fff;}
.milestone-banner.streak{background:linear-gradient(135deg,#a8edea,#fed6e3);color:#5d3a6b;}
.m-icon{font-size:1.5rem;}.m-text{flex:1;}.m-sub{font-size:.68rem;font-weight:500;opacity:.9;margin-top:2px;}
.m-btn{background:rgba(255,255,255,.25);border:none;color:inherit;font-family:inherit;font-weight:700;font-size:.72rem;padding:5px 9px;border-radius:15px;cursor:pointer;white-space:nowrap;margin-left:3px;}
.milestone-banner.m20 .m-btn,.milestone-banner.m50 .m-btn{color:#fff;}

.section-card{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:11px;overflow:hidden;}
.section-head{padding:10px 13px;display:flex;align-items:center;gap:7px;border-bottom:1px solid #F0F0F0;font-weight:700;font-size:.86rem;}
.s-badge{margin-left:auto;font-size:.64rem;padding:2px 7px;border-radius:9px;font-weight:700;}
.bg{background:#E8F8EF;color:#27ae60;}.br{background:#FFF0F0;color:#e74c3c;}.bb{background:#EBF4FF;color:#3182ce;}.by{background:#FFF8E1;color:#f39c12;}
.task-row{display:flex;align-items:center;padding:9px 13px;border-bottom:1px solid #F7F7F7;gap:9px;transition:background .15s;}
.task-row:last-child{border-bottom:none;}.task-row:hover{background:#FAFBFF;}
.task-label{flex:1;font-size:.87rem;font-weight:500;line-height:1.35;}
.task-pts-lbl{font-size:.7rem;font-weight:700;min-width:30px;text-align:right;color:var(--soft);}
.check-wrap{position:relative;cursor:pointer;flex-shrink:0;}
.check-wrap input{position:absolute;opacity:0;width:0;height:0;}
.checkmark{width:28px;height:28px;border-radius:8px;border:2.5px solid #CBD5E0;display:flex;align-items:center;justify-content:center;transition:all .2s;background:#fff;user-select:none;}
.check-wrap input:checked+.checkmark{background:#4CAF7D;border-color:#4CAF7D;box-shadow:0 2px 8px rgba(76,175,125,.4);}
.check-wrap input:checked+.checkmark::after{content:'✓';color:#fff;font-weight:900;font-size:.93rem;}
.pen-wrap input:checked+.checkmark{background:var(--coral);border-color:var(--coral);box-shadow:0 2px 8px rgba(255,107,107,.4);}
.pen-wrap input:checked+.checkmark::after{content:'✗';color:#fff;font-weight:900;font-size:.93rem;}
.add-row{display:flex;gap:7px;padding:8px 12px;border-top:1px dashed #E2E8F0;}
.add-inp{flex:1;border:1.5px solid #E2E8F0;border-radius:8px;padding:6px 9px;font-family:inherit;font-size:.82rem;color:var(--ink);outline:none;background:#FAFBFF;transition:border-color .2s;}
.add-inp:focus{border-color:#667eea;}
.add-btn{background:#667eea;color:#fff;border:none;border-radius:8px;padding:6px 10px;font-family:inherit;font-size:.76rem;font-weight:700;cursor:pointer;white-space:nowrap;}
.add-btn:hover{opacity:.85;}.add-btn.red{background:#e74c3c;}
.del-btn{background:none;border:none;cursor:pointer;color:#CBD5E0;font-size:.86rem;padding:3px 4px;border-radius:5px;transition:color .2s;}
.del-btn:hover{color:var(--coral);}
.streak-info{background:#FFF0F0;border:2px solid #FF6B6B;border-radius:10px;padding:8px 12px;margin-bottom:10px;font-size:.78rem;color:#c53030;font-weight:700;}
.hist-item{padding:8px 12px;border-bottom:1px solid #F7F7F7;display:flex;align-items:center;gap:9px;font-size:.79rem;}
.h-pts{font-weight:900;font-size:.84rem;min-width:32px;}.h-pts.pos{color:#27ae60;}.h-pts.neg{color:#e74c3c;}
.h-meta{color:var(--soft);font-size:.68rem;margin-top:1px;}

.pcard-item{background:linear-gradient(135deg,#FF6B6B,#ee0979);border-radius:13px;padding:13px 15px;margin:8px 12px;color:#fff;display:flex;align-items:center;gap:10px;box-shadow:0 4px 15px rgba(238,9,121,.3);}
.pcard-item .pi-icon{font-size:1.6rem;}.pcard-item .pi-body{flex:1;}.pcard-item .pi-title{font-size:.95rem;font-weight:900;margin-bottom:2px;}.pcard-item .pi-sub{font-size:.68rem;opacity:.85;}
.pcard-done-btn{background:rgba(255,255,255,.25);border:none;color:#fff;font-family:inherit;font-weight:700;font-size:.75rem;padding:6px 11px;border-radius:12px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.pcard-done-btn:hover{background:rgba(255,255,255,.4);}
.empty-pq,.empty-chest{text-align:center;padding:22px;color:var(--soft);font-size:.84rem;}.empty-pq div,.empty-chest div{font-size:2.2rem;margin-bottom:7px;}
.treasure-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;padding:10px 12px;}
.ti{border-radius:14px;overflow:hidden;box-shadow:0 3px 14px rgba(0,0,0,.14);transition:transform .2s;}.ti:hover{transform:translateY(-3px);}.ti-body{padding:11px 12px;}.ti-type{font-size:.52rem;font-weight:900;letter-spacing:.12em;text-transform:uppercase;margin-bottom:2px;}.ti-name{font-size:.86rem;font-weight:900;margin-bottom:3px;}.ti-pts{font-size:.66rem;font-weight:700;margin-bottom:5px;opacity:.85;}.ti-desc{font-size:.68rem;line-height:1.4;opacity:.9;}
.ti.luck-ti{background:linear-gradient(135deg,#f6d365,#fda085);color:#5d3a00;}
.ti.quiz-ti{background:linear-gradient(135deg,#a1c4fd,#c2e9fb);color:#1a3a5c;}
.ti-use{display:block;width:100%;padding:7px;border:none;background:rgba(0,0,0,.15);font-family:inherit;font-size:.72rem;font-weight:700;cursor:pointer;color:inherit;}
.ti-use:hover{background:rgba(0,0,0,.27);}

.pkcard{border-radius:20px;width:100%;max-width:300px;margin:0 auto 12px;position:relative;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,.3);animation:cardSlide .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes cardSlide{from{transform:translateY(30px) scale(.88);opacity:0;}to{transform:none;opacity:1;}}
.pk-shine{position:absolute;inset:0;pointer-events:none;background:linear-gradient(115deg,transparent 35%,rgba(255,255,255,.25) 50%,transparent 65%);background-size:200% 100%;animation:shine 3.5s linear infinite;}
@keyframes shine{0%{background-position:-200% 0}100%{background-position:200% 0}}
.pk-top{padding:14px 16px 8px;position:relative;z-index:1;}.pk-type{font-size:.56rem;font-weight:900;letter-spacing:.16em;opacity:.8;margin-bottom:3px;}.pk-title{font-size:1.25rem;font-weight:900;line-height:1.15;margin-bottom:5px;text-shadow:0 1px 3px rgba(0,0,0,.2);}.pk-pts-badge{display:inline-block;padding:3px 12px;border-radius:18px;font-size:.8rem;font-weight:900;background:rgba(255,255,255,.28);margin-bottom:9px;}.pk-art{font-size:3rem;text-align:center;padding:8px 0;line-height:1;}.pk-divider{height:1.5px;background:rgba(255,255,255,.25);margin:0 16px;}.pk-desc{padding:10px 16px;font-size:.77rem;line-height:1.58;opacity:.93;font-weight:500;}.pk-footer{padding:5px 16px 13px;font-size:.58rem;opacity:.6;letter-spacing:.1em;font-weight:700;}
.pkcard.luck{background:linear-gradient(145deg,#f6d365 0%,#fda085 55%,#f093fb 100%);}
.pkcard.punish{background:linear-gradient(145deg,#FF416C 0%,#FF4B2B 50%,#8B0000 100%);}
.pkcard.quiz{background:linear-gradient(145deg,#4facfe 0%,#00f2fe 60%,#43e97b 100%);}
.pkcard *{color:#fff!important;}

.quiz-q{background:#F7F8FC;border-radius:11px;padding:13px 14px;margin-bottom:10px;font-size:.9rem;font-weight:700;line-height:1.5;color:var(--ink);text-align:left;}
.quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:9px;}
.quiz-opt{padding:9px 11px;border-radius:10px;border:2px solid #E2E8F0;background:#fff;font-family:inherit;font-size:.82rem;cursor:pointer;font-weight:600;text-align:left;}
.quiz-opt:hover:not(:disabled){border-color:#667eea;background:#F0F3FF;}
.quiz-opt.correct{border-color:#27ae60!important;background:#E8F8EF!important;color:#27ae60!important;}
.quiz-opt.wrong{border-color:#e74c3c!important;background:#FFF0F0!important;color:#e74c3c!important;}
.quiz-opt.reveal{border-color:#27ae60!important;background:#E8F8EF!important;color:#27ae60!important;}
.quiz-analysis{background:#F0F3FF;border-radius:10px;padding:10px 13px;font-size:.78rem;color:#444;line-height:1.65;margin-top:6px;border-left:3px solid #667eea;text-align:left;}
.quiz-progress{display:flex;justify-content:space-between;align-items:center;font-size:.74rem;color:var(--soft);margin-bottom:9px;}

.full-yell-overlay{position:fixed;inset:0;background:radial-gradient(circle,#ff4d4d,#990000);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;animation:flashRed .5s infinite alternate;padding:20px;}
@keyframes flashRed{from{background:radial-gradient(circle,#ff4d4d,#b30000);}to{background:radial-gradient(circle,#ff1a1a,#660000);}}
.yell-num{font-size:8rem;font-weight:900;text-shadow:0 4px 20px rgba(0,0,0,.5);line-height:1;margin-bottom:10px;}
.yell-txt{font-size:1.5rem;font-weight:900;margin-bottom:8px;letter-spacing:1px;text-align:center;}
.yell-warn{font-size:.9rem;font-weight:700;margin-bottom:26px;text-align:center;background:rgba(0,0,0,.25);padding:6px 14px;border-radius:20px;}
.yell-cancel-btn{background:#fff;color:#cc0000;border:none;padding:15px 40px;border-radius:50px;font-size:1.4rem;font-weight:900;cursor:pointer;box-shadow:0 6px 25px rgba(0,0,0,.3);transition:transform .1s;}
.yell-cancel-btn:hover{transform:scale(1.05);}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.58);backdrop-filter:blur(6px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:14px;}
.modal{background:#fff;border-radius:22px;padding:20px 17px;max-width:400px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3);max-height:92vh;overflow-y:auto;}
.modal .me{font-size:2.6rem;margin-bottom:8px;}.modal h2{font-size:1.1rem;font-weight:900;margin-bottom:6px;}.modal p{font-size:.84rem;color:var(--soft);margin-bottom:13px;line-height:1.62;}
.gacha-ball{width:95px;height:95px;border-radius:50%;background:linear-gradient(135deg,#f093fb,#f5576c);margin:0 auto 13px;display:flex;align-items:center;justify-content:center;font-size:2.4rem;box-shadow:0 8px 30px rgba(240,147,251,.5);cursor:pointer;user-select:none;}
.gacha-ball.blue{background:linear-gradient(135deg,#4facfe,#00f2fe);box-shadow:0 8px 30px rgba(79,172,254,.5);}
.gacha-ball.pink{background:linear-gradient(135deg,#a8edea,#fed6e3);box-shadow:0 8px 30px rgba(253,182,227,.6);}
.gacha-ball.spinning{animation:spin .6s ease-in-out infinite;}
@keyframes spin{0%{transform:rotate(0) scale(1);}50%{transform:rotate(180deg) scale(1.15);}100%{transform:rotate(360deg) scale(1);}}
.prize-reveal{font-size:2rem;font-weight:900;color:var(--sun);text-shadow:0 2px 10px rgba(255,184,0,.5);margin:8px 0;animation:pop .4s cubic-bezier(.175,.885,.32,1.275);}
@keyframes pop{0%{transform:scale(0);}70%{transform:scale(1.2);}100%{transform:scale(1);}}
.mbtn{display:block;width:100%;padding:11px;border-radius:11px;border:none;font-family:inherit;font-size:.86rem;font-weight:700;cursor:pointer;margin-top:7px;text-align:center;}
.mbtn.primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;}.mbtn.danger{background:linear-gradient(135deg,#FF6B6B,#ee0979);color:#fff;}.mbtn.secondary{background:#F7F7F7;color:var(--soft);}.mbtn.gold{background:linear-gradient(135deg,#f6d365,#fda085);color:#5d3a00;}
.reset-bar{display:flex;justify-content:flex-end;margin-bottom:10px;}
.reset-btn{background:none;border:1.5px solid #E2E8F0;border-radius:8px;padding:5px 12px;font-family:inherit;font-size:.72rem;color:var(--soft);cursor:pointer;font-weight:600;}

.setup-page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;padding:28px 18px;text-align:center;}
.setup-page h2{font-size:1.4rem;font-weight:900;margin-bottom:7px;}.setup-page p{color:var(--soft);font-size:.86rem;margin-bottom:20px;}
.name-inputs{display:flex;flex-direction:column;gap:10px;width:100%;max-width:290px;}
.name-field{background:#fff;border:2px solid #E2E8F0;border-radius:12px;padding:11px 14px;font-family:inherit;font-size:1rem;color:var(--ink);outline:none;width:100%;}
.start-btn{margin-top:12px;width:100%;max-width:290px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:12px;padding:13px;font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer;}
.star-bg{position:fixed;pointer-events:none;inset:0;overflow:hidden;z-index:-1;}.star{position:absolute;font-size:1.1rem;opacity:.06;animation:float linear infinite;}
@keyframes float{from{transform:translateY(100vh) rotate(0);}to{transform:none;transform:translateY(-10vh) rotate(360deg);}}
.lvl-btn{padding:7px 14px;border-radius:20px;border:2px solid #E2E8F0;background:#fff;font-family:inherit;font-size:.78rem;font-weight:700;cursor:pointer;color:var(--soft);width:100%;text-align:left;margin-bottom:6px;}
.lvl-btn.active{border-color:#667eea;background:#667eea;color:#fff;}
.mgr-list-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f0f0f0;text-align:left;}
.kidcount-row{display:flex;gap:7px;margin-bottom:14px;}
.kc-btn{flex:1;padding:9px 0;border-radius:10px;border:2px solid #E2E8F0;background:#fff;font-family:inherit;font-weight:900;font-size:.95rem;color:var(--soft);cursor:pointer;}
.kc-btn.active{border-color:#667eea;background:#667eea;color:#fff;}
/* calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin:10px 0;}
.cal-dow{font-size:.66rem;color:var(--soft);text-align:center;font-weight:700;padding:2px 0;}
.cal-day{aspect-ratio:1;border-radius:8px;border:none;background:#F7F8FC;font-family:inherit;font-size:.78rem;font-weight:700;cursor:pointer;position:relative;color:var(--ink);}
.cal-day:hover{background:#e2e8f0;}
.cal-day.today{background:#667eea;color:#fff;}

/* ════ 音效引擎 ════ */
const AudioEngine = {
  ctx: null,
  init() { if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
  click(){ this.init(); const t=this.ctx.currentTime; this.osc(700,'square',t,0.05); },
  playDone() { this.init(); const t = this.ctx.currentTime; this.osc(523.25,'sine',t,0.1); this.osc(659.25,'sine',t+0.1,0.1); this.osc(783.99,'sine',t+0.2,0.2); },
  playMilestone() { this.init(); const t = this.ctx.currentTime; this.osc(392,'square',t,0.15); this.osc(523.25,'square',t+0.15,0.15); this.osc(659.25,'square',t+0.3,0.15); this.osc(1046.5,'square',t+0.45,0.4); },
  playAlarm() { this.init(); let t = this.ctx.currentTime; for(let i=0;i<3;i++){ this.osc(880,'sawtooth',t,0.15); t+=0.3; } },
  sirenInterval: null,
  startSiren() {
    this.init(); if(this.sirenInterval) return;
    let high = true;
    this.sirenInterval = setInterval(() => { this.osc(high?1200:500,'sawtooth',this.ctx.currentTime,0.28,0.35); high=!high; }, 220);
  },
  stopSiren() { if(this.sirenInterval) { clearInterval(this.sirenInterval); this.sirenInterval = null; } },
  osc(freq, type, start, dur, vol) {
    try {
      const o = this.ctx.createOscillator(); const g = this.ctx.createGain();
      o.type = type; o.frequency.setValueAtTime(freq, start);
      g.gain.setValueAtTime(vol||0.2, start); g.gain.exponentialRampToValueAtTime(0.00001, start + dur);
      o.connect(g); g.connect(this.ctx.destination); o.start(start); o.stop(start + dur);
    } catch(e) {}
  }
};
function bClick(){ try{ AudioEngine.click(); }catch(e){} }
document.addEventListener('click', function(e){ if(e.target.closest('button')) bClick(); }, true);

function todayKey(d){ d=d||new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function dateKeyMinus(days){ const d=new Date(); d.setDate(d.getDate()-days); return todayKey(d); }

function mkKid(name,avatar){
  return {
    name,avatar,totalPts:0,history:[],checks:{},specChecks:{},penalties:{},
    todaysMistakeCount:0, goodActionCounter:0, allActionCounter:0,
    lastLuckyDate:'', difficulty:2, wrongQids:[],
    customTasks:[], customPenalties:[], customSpecial:[], hiddenDefault:[], hiddenPenalty:[],
    treasureBox:[], punishQueue:[], activeTab:0,
    homework:{}, noDefectStreak:0, lastStreakCheckDate:'', streakBonusAvailable:false,
    gachaLog:[]
  };
}
function setupKidCountUI(){
  const wrap=document.getElementById('kidCountRow');
  wrap.innerHTML=[1,2,3,4].map(n=>'<button type="button" class="kc-btn'+(n===2?' active':'')+'" data-n="'+n+'" onclick="pickKidCount('+n+')">'+n+' 人</button>').join('');
  pickKidCount(2);
}
function pickKidCount(n){
  document.querySelectorAll('.kc-btn').forEach(b=>b.classList.toggle('active', +b.dataset.n===n));
  const names=['小明','小華','小美','小強'];
  const avs=['🐯','🐰','🐱','🐶'];
  const wrap=document.getElementById('nameInputsWrap');
  let html='';
  for(let i=0;i<n;i++){ html+='<input class="name-field" id="nameInput'+i+'" maxlength="6" value="'+names[i]+'" placeholder="小孩'+(i+1)+'的名字">'; }
  wrap.innerHTML=html;
  wrap.dataset.count=n;
}
function startApp(){
  const n=+document.getElementById('nameInputsWrap').dataset.count || 2;
  const kids=[]; const avs=['🐯','🐰','🐱','🐶'];
  for(let i=0;i<n;i++){
    const v=(document.getElementById('nameInput'+i).value||'').trim();
    if(!v){notify('請填寫所有名字！');return;}
    kids.push(mkKid(v,avs[i]));
  }
  state={
    kids, activeKid:0,
    luckCardsPool:[...INITIAL_LUCK_CARDS],
    punishCardsPool:[...INITIAL_PUNISH_CARDS],
    globalQBank:[...QBANK]
  };
  saveState();
  document.getElementById('setupScreen').style.display='none';
  document.getElementById('mainApp').style.display='block';
  renderAll();
}

function addHist(kid,label,pts){
  kid.history.unshift({id:'h'+Date.now()+Math.random().toString(36).slice(2,6),label,pts,time:new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}),date:todayKey()});
  if(kid.history.length>150) kid.history.pop();
}
function delHistItem(ki,id){
  const kid=state.kids[ki]; kid.history=kid.history.filter(h=>h.id!==id); saveState(); renderAll();
}
function delGachaItem(ki,idx){
  const kid=state.kids[ki]; if(!kid.gachaLog) return; kid.gachaLog.splice(idx,1); saveState(); renderAll();
}
function quickAdj(ki,delta){
  const kid=state.kids[ki]; kid.totalPts+=delta;
  addHist(kid,(delta>0?'🔧 快速加分':'🔧 快速扣分')+'（'+(delta>0?'+':'')+delta+'）',delta);
  if(delta>0) checkPointsMilestone(kid);
  saveState(); renderAll();
}

function toggleTask(ki,id,isDone){
  const kid=state.kids[ki]; const dk=todayKey();
  if(!kid.checks[dk]) kid.checks[dk]={};
  const was=!!kid.checks[dk][id]; if(isDone===was) return;
  kid.checks[dk][id]=isDone;
  const t=[...DEFAULT_TASKS,...(kid.customTasks||[])].find(x=>x.id===id)||{label:id,pts:1};

  if(isDone){
    kid.totalPts+=t.pts; addHist(kid,'✅ '+t.label,+t.pts);
    AudioEngine.playDone(); checkPointsMilestone(kid);
    kid.goodActionCounter=(kid.goodActionCounter||0)+1; kid.allActionCounter=(kid.allActionCounter||0)+1;
    maybeTriggerLuck(ki); maybeTriggerQuiz(ki,'good');
  }else{
    kid.totalPts-=t.pts; addHist(kid,'☐ '+t.label+' (取消)',-t.pts);
  }
  saveState(); renderAll();
}
function toggleSpecial(ki,id,isDone){
  const kid=state.kids[ki]; const dk=todayKey();
  if(!kid.specChecks[dk]) kid.specChecks[dk]={};
  const was=!!kid.specChecks[dk][id]; if(isDone===was) return;
  kid.specChecks[dk][id]=isDone;
  const s=[...DEFAULT_SPECIAL,...(kid.customSpecial||[])].find(x=>x.id===id); if(!s) return;
  let delta=isDone?(s.penalty<0?s.pts-s.penalty:s.pts):(s.penalty<0?-(s.pts-s.penalty):-s.pts);
  kid.totalPts+=delta;
  addHist(kid,(isDone?'⭐':'☐')+' '+s.label+(isDone?'':' (取消)'),delta);
  if(isDone){
    AudioEngine.playDone(); checkPointsMilestone(kid);
    kid.goodActionCounter=(kid.goodActionCounter||0)+1; kid.allActionCounter=(kid.allActionCounter||0)+1;
    maybeTriggerLuck(ki); maybeTriggerQuiz(ki,'good');
  }
  saveState(); renderAll();
}
function checkPointsMilestone(kid) {
  if (kid.totalPts > 0 && kid.totalPts % 10 === 0) {
    AudioEngine.playMilestone();
    setTimeout(() => {
      openModal('<div class="me">🎉</div><h2>完美跨越里程碑！</h2><p>恭喜 <strong>'+kid.name+'</strong> 達到全新的 <strong>'+kid.totalPts+'</strong> 點！<br>保持這個完美勢頭，繼續加油！</p><button class="mbtn primary" onclick="closeModal()">太棒了！</button>');
    }, 400);
  }
}

/* ════ 缺失邏輯：機會（懲罰任務）卡每5次累計缺失強制觸發 ════ */
function togglePenalty(ki,id,isChecked){
  const kid=state.kids[ki]; const dk=todayKey();
  if(!kid.penalties[dk]) kid.penalties[dk]={};
  const was=!!kid.penalties[dk][id]; if(isChecked===was) return;
  kid.penalties[dk][id]=isChecked;
  const p=[...DEFAULT_PENALTIES,...(kid.customPenalties||[])].find(x=>x.id===id)||{label:id};

  if(isChecked){
    kid.totalPts-=1; addHist(kid,'❌ '+p.label,-1);
    kid.todaysMistakeCount=(kid.todaysMistakeCount||0)+1;
    kid.allActionCounter=(kid.allActionCounter||0)+1;
    if(kid.todaysMistakeCount>=5){
      kid.todaysMistakeCount=0;
      saveState(); renderAll();

      saveState(); renderAll();
      setTimeout(()=>{ openModal('<div class="me">⚠️</div><h2>已累積 3 次缺失！</h2><p>再累積 2 次（滿5次）就會強制觸發懲罰任務卡，請提醒孩子多加注意！</p><button class="mbtn danger" onclick="closeModal()">我會多注意</button>'); },300);
      return;
    }
    maybeTriggerQuiz(ki,'bad');
  }else{
    kid.totalPts+=1; addHist(kid,'↩️ '+p.label+' (取消)',+1);
    if(kid.todaysMistakeCount>0) kid.todaysMistakeCount--;
  }
  saveState(); renderAll();
}

/* ════ 智慧卡：每累積 5 次加減分動作觸發，可選作答或先收藏 ════ */
function maybeTriggerQuiz(ki,mode){

function offerQuiz(ki,mode){
  openModal('<div class="me">🧠</div><h2>⚡ 智慧卡出現了！</h2><p>要現在挑戰 5 題益智問答，還是先把這張智慧卡收進寶盒，之後有空再作答呢？</p>'
    +'<div class="qsave-row"><button class="mbtn primary" onclick="closeModal();startQuiz('+ki+',\''+mode+'\')">📝 現在作答</button><button class="mbtn secondary" onclick="saveQuizCard('+ki+',\''+mode+'\')">🎁 先收進寶盒</button></div>');
}
function saveQuizCard(ki,mode){
  const kid=state.kids[ki]; if(!kid.treasureBox) kid.treasureBox=[];
  kid.treasureBox.push({kind:'quiz',uid:'u'+Date.now(),name:'智慧挑戰卡',icon:'🧠',qmode:mode,desc:'收藏的智慧卡，答對可獲得點數獎勵，可隨時取用作答。'});
  addHist(kid,'🎁 收藏了一張智慧卡',0);
  saveState(); renderAll(); closeModal();
}
function startQuiz(ki,mode){
  const kid=state.kids[ki]; const lvl=kid.difficulty||2;
  const fullPool = state.globalQBank || QBANK;
  let pool=fullPool.filter(q=>q.level<=lvl); if(pool.length===0) pool=[...fullPool];
  const shuffle=a=>{for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};
  const wrong=shuffle(pool.filter(q=>(kid.wrongQids||[]).includes(q.id)));
  const others=shuffle(pool.filter(q=>!(kid.wrongQids||[]).includes(q.id)));
  let chosen=[...wrong.slice(0,2),...others].slice(0,5);
  if(chosen.length<5) chosen=shuffle([...pool]).slice(0,5);
  quizSession={ki,mode,questions:chosen,current:0,score:0,wrongInSession:[]};
  showQuizModal();
}
function showQuizModal(){
  if(!quizSession) return;
  const {questions,current,score}=quizSession; const q=questions[current];
  const opts=q.opts.map((o,i)=>'<button class="quiz-opt" onclick="answerQ('+i+')" id="qo'+i+'">'+String.fromCharCode(65+i)+'. '+escH(o)+'</button>').join('');
  openModal('<div class="me">📝</div><h2>⚡ 智慧卡挑戰</h2>'
    +'<div class="quiz-progress"><span>目前第 '+(current+1)+' / '+questions.length+' 題</span><span style="color:#667eea;font-weight:900">得分：'+score+'</span></div>'
    +'<div class="quiz-q"><strong>【'+q.type+'】</strong>'+escH(q.q)+'</div>'
    +'<div class="quiz-opts">'+opts+'</div>'
    +'<div id="qAna"></div>'
    +'<button class="mbtn primary" id="qNext" style="display:none;margin-top:10px" onclick="nextQ()">下一題 →</button>');
}
function answerQ(chosen){
  if(!quizSession) return; const q=quizSession.questions[quizSession.current];
  for(let i=0;i<q.opts.length;i++){const b=document.getElementById('qo'+i); if(b) b.disabled=true;}
  const isOk=(chosen===q.ans);
  if(isOk){ document.getElementById('qo'+chosen)?.classList.add('correct'); quizSession.score++; }
  else{ document.getElementById('qo'+chosen)?.classList.add('wrong'); document.getElementById('qo'+q.ans)?.classList.add('reveal'); quizSession.wrongInSession.push(q.id); }
  document.getElementById('qAna').innerHTML='<div class="quiz-analysis"><strong>'+(isOk?'✅ 恭喜答對！':'❌ 答錯囉！')+'</strong><br>解析：'+escH(q.analysis)+'</div>';
  document.getElementById('qNext').style.display='block';
}
function nextQ(){
  quizSession.current++; if(quizSession.current>=quizSession.questions.length){ finishQuiz(); return; } showQuizModal();
}
function finishQuiz(){
  const {ki,score,questions,wrongInSession,mode}=quizSession; const total=questions.length; const kid=state.kids[ki];
  let pts=0; let msg='';
  if(score===total){
    pts = (mode==='bad') ? 1 : 2;
    msg = (mode==='bad') ? '👍 全對表現優異！獲得 +1 點！' : '🎉 完美全對表現優異！獲得 +2 點！';
  }else{
    msg='只要有一題答錯就無法加分囉，再接再厲！';
  }
  if(pts){ kid.totalPts+=pts; addHist(kid,'📝 智慧卡挑戰全對 '+score+'/'+total,pts); checkPointsMilestone(kid); }
  else{ addHist(kid,'📝 智慧卡挑戰答對 '+score+'/'+total+'（未全對，無加分）',0); }
  const corrected=questions.filter(q=>!wrongInSession.includes(q.id)).map(q=>q.id);
  kid.wrongQids=[...new Set([...(kid.wrongQids||[]).filter(id=>!corrected.includes(id)),...wrongInSession])];
  saveState(); quizSession=null;
  openModal('<div class="me">📊</div><h2>挑戰結束</h2><p>最終答對題數：<strong>'+score+' / '+total+'</strong><br>'+msg+'</p><button class="mbtn primary" onclick="closeModal();renderAll()">確認收下</button>');
  renderAll();
}

/* 每天檢查一次是否延續零缺失連續紀錄 */
function updateStreaks(){
  const today=todayKey();
  state.kids.forEach(kid=>{
    if(kid.lastStreakCheckDate===today) return;
    const yKey=dateKeyMinus(1);
    if(kid.checks[yKey] || kid.penalties[yKey] || kid.specChecks[yKey]){
      const yPen=kid.penalties[yKey]||{};
      const hadMistake=Object.values(yPen).some(v=>v);
      if(hadMistake){ kid.noDefectStreak=0; }
      else{ kid.noDefectStreak=(kid.noDefectStreak||0)+1; }
      if(kid.noDefectStreak>=2){ kid.streakBonusAvailable=true; }
    }
    kid.lastStreakCheckDate=today;
  });
  saveState();
}

  const kid=state.kids[calKi]; const hw=migrateHW(kid,key);

function importQuestionsJSON(ev){
  const file=ev.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const imported=JSON.parse(e.target.result);
      const arr = imported.questions || imported;
      if(!Array.isArray(arr)) throw new Error('題庫格式必須為陣列');
      state.globalQBank = arr; saveState();
      notify('🎉 獨立新題庫匯入完成！總計共 '+arr.length+' 題。');
      switchMgrTab('qbank');
    }catch(err){ notify('匯入題庫出錯：'+err.message); }
  }; reader.readAsText(file);
}

  const mCount = kid.todaysMistakeCount || 0;
  const streakH = mCount > 0 ? '<div class="streak-info">⚠️ 今日已被記缺失：'+mCount+' 次（滿 3 次會提醒警告，滿 5 次會自動觸發強制懲罰任務卡！）</div>' : '';
  const boxCount = (kid.treasureBox||[]).length; const pqCount = (kid.punishQueue||[]).length;

  const innerNav='<div class="inner-nav">'
    +'<button class="inner-tab'+(tab===0?' active':'')+'" onclick="switchTab('+ki+',0)">✅ 加分</button>'
    +'<button class="inner-tab'+(tab===1?' active':'')+'" onclick="switchTab('+ki+',1)">⭐ 特別</button>'
    +'<button class="inner-tab'+(tab===2?' active':'')+'" onclick="switchTab('+ki+',2)">⚠️ 缺失</button>'
    +'<button class="inner-tab'+(tab===3?' active':'')+'" onclick="switchTab('+ki+',3)">🎁 寶盒 ('+boxCount+')</button>'
    +'<button class="inner-tab'+(tab===4?' active':'')+'" onclick="switchTab('+ki+',4)">🃏 懲罰庫 ('+pqCount+')</button>'
    +'<button class="inner-tab'+(tab===5?' active':'')+'" onclick="switchTab('+ki+',5)">📋 歷史</button>'
    +'<button class="inner-tab'+(tab===6?' active':'')+'" onclick="switchTab('+ki+',6)">🏆 領獎</button>'
    +'</div>';

  const taskRows=allT.map(t=>{ const done=!!checks[t.id];
    return '<div class="task-row"><span>'+t.icon+'</span><span class="task-label" style="'+(done?'text-decoration:line-through;color:#CBD5E0':'')+'">'+escH(t.label)+'</span>'
      +'<span class="task-pts-lbl" style="color:'+(done?'#27ae60':'#718096')+'">'+(done?'+'+t.pts:'')+'</span>'
      +'<button class="del-btn" onclick="delCTask('+ki+',\''+t.id+'\')">✕</button>'
      +'<label class="check-wrap"><input type="checkbox" class="task-check" data-ki="'+ki+'" data-id="'+t.id+'" '+(done?'checked':'')+'><div class="checkmark"></div></label></div>';
  }).join('');
  const sec0='<div class="section-card"><div class="section-head">✅ 常規加分項目</div>'+taskRows+'<div class="add-row"><input id="ctInp'+ki+'" class="add-inp" placeholder="新增自訂加分任務..."><button class="add-btn" onclick="addCTask('+ki+')">＋</button></div></div>';

  const specRows=allS.map(s=>{ const done=!!specChecks[s.id];
    return '<div class="task-row"><span>'+s.icon+'</span><div style="flex:1"><div class="task-label" style="'+(done?'text-decoration:line-through;color:#CBD5E0':'')+'">'+escH(s.label)+'</div><div style="font-size:.68rem;color:var(--soft)">'+(s.desc||('打勾+'+s.pts))+'</div></div>'
      +'<label class="check-wrap"><input type="checkbox" class="spec-check" data-ki="'+ki+'" data-id="'+s.id+'" '+(done?'checked':'')+'><div class="checkmark"></div></label></div>';
  }).join('');
  const sec1='<div class="section-card"><div class="section-head">⭐ 特別表現大獎勵</div>'+specRows+'</div>';

  const penRows=allP.map(p=>{ const hit=!!penChecks[p.id];
    return '<div class="task-row"><span>'+p.icon+'</span><span class="task-label" style="'+(hit?'color:var(--coral);font-weight:700':'')+'">'+escH(p.label)+'</span>'
      +'<button class="del-btn" onclick="delCPen('+ki+',\''+p.id+'\')">✕</button>'
      +'<label class="check-wrap pen-wrap"><input type="checkbox" class="pen-check" data-ki="'+ki+'" data-id="'+p.id+'" '+(hit?'checked':'')+'><div class="checkmark"></div></label></div>';
  }).join('');
  const sec2=streakH+'<div class="section-card"><div class="section-head">⚠️ 行為表現缺失扣分區</div>'+penRows+'<div class="add-row"><input id="cpInp'+ki+'" class="add-inp" placeholder="新增自訂缺失..."><button class="add-btn red" onclick="addCPen('+ki+')">＋</button></div></div>';

  const box=kid.treasureBox||[];
  const boxContent=box.length===0?'<div class="empty-chest"><div>📭</div>個人隨身寶盒目前空空如也</div>'
    :'<div class="treasure-grid">'+box.map(c=>{
      if(c.kind==='quiz'){
        return '<div class="ti quiz-ti"><div class="ti-body"><div class="ti-name">'+c.icon+' '+escH(c.name)+'</div><div class="ti-desc">'+escH(c.desc)+'</div></div><button class="ti-use" onclick="useCard('+ki+',\''+c.uid+'\')">📝 馬上作答</button></div>';
      }
      return '<div class="ti luck-ti"><div class="ti-body"><div class="ti-name">'+c.icon+' '+escH(c.name)+'</div><div class="ti-desc" style="font-size:.68rem">'+escH(c.desc)+'</div></div><button class="ti-use" onclick="useCard('+ki+',\''+c.uid+'\')">🃏 立刻宣告使用</button></div>';
    }).join('')+'</div>';
  const sec3='<div class="section-card"><div class="section-head">🎁 命運卡與智慧卡隨身寶盒</div>'+boxContent+'</div>';

  const pq=kid.punishQueue||[];
  const pqContent=pq.length===0?'<div class="empty-pq"><div>😇</div>太棒了！目前沒有任何未執行的懲罰</div>'
    :pq.map(p=>'<div class="pcard-item"><div class="pi-body"><div class="pi-title">'+escH(p.text)+'</div><div class="pi-sub">'+p.date+' '+p.time+' 分配</div></div><button class="pcard-done-btn" onclick="donePunish('+ki+',\''+p.uid+'\')">✅ 家長點擊核銷</button></div>').join('');
  const sec4='<div class="section-card"><div class="section-head">🃏 未完成懲罰保管處</div>'+pqContent+'</div>';

  const histHTML=kid.history.length===0?'<div style="padding:20px;text-align:center;color:var(--soft);">尚無任何歷史變動數據</div>'
    :kid.history.map(h=>'<div class="hist-item"><span class="h-pts '+(h.pts>0?'pos':(h.pts<0?'neg':''))+'">'+(h.pts!==0?(h.pts>0?'+':'')+h.pts:'·')+'</span><div style="flex:1"><div>'+escH(h.label)+'</div><div class="h-meta">'+h.date+' '+h.time+'</div></div><button class="del-btn" onclick="delHistItem('+ki+',\''+h.id+'\')" title="只刪除這筆紀錄，不影響點數">✕</button></div>').join('');
  const sec5='<div class="section-card"><div class="section-head">📋 歷史行為事件簿<span class="s-badge bb">點右側✕可單筆刪除</span></div>'+histHTML+'</div>';

  const glog=kid.gachaLog||[];
  const glogHTML=glog.length===0?'<div style="padding:20px;text-align:center;color:var(--soft);">尚無任何抽獎領取紀錄</div>'
    :glog.map((g,gi)=>'<div class="hist-item"><span class="h-pts pos">🎁</span><div style="flex:1">'+(g.tier==='streak'?'連續零缺失獎勵':(g.tier+' 點扭蛋'))+'：獲得 '+g.amount+' 元<div class="h-meta">'+g.date+' '+g.time+'</div></div><button class="del-btn" onclick="delGachaItem('+ki+','+gi+')">✕</button></div>').join('');
  const sec6='<div class="section-card"><div class="section-head">🏆 累計抽獎領取紀錄</div>'+glogHTML+'</div>';

  const hw=migrateHW(kid,dk);
  const hwDone=hw.items.filter(i=>i.done).length; const hwTotal=hw.items.length;
  const hwRows=hw.items.map(it=>'<div class="task-row"><label class="check-wrap"><input type="checkbox" onchange="toggleHwItemInline('+ki+',\''+dk+'\',\''+it.id+'\',this.checked)" '+(it.done?'checked':'')+'><div class="checkmark"></div></label><span class="task-label" style="'+(it.done?'text-decoration:line-through;color:#CBD5E0':'')+'">'+escH(it.text)+'</span></div>').join('');
  const hwAwardBadge = hw.awarded ? '<span class="s-badge '+(hw.awarded.pts>=0?'bg':'br')+'">今日已評分 '+(hw.awarded.pts>=0?'+':'')+hw.awarded.pts+'</span>' : (hwTotal>0?'<span class="s-badge by">'+hwDone+'/'+hwTotal+' 完成</span>':'');
  const secHW='<div class="section-card"><div class="section-head">📋 今日功課清單（'+todayLabel()+'）'+hwAwardBadge+'</div>'
    +(hwTotal===0?'<div style="padding:14px;text-align:center;color:var(--soft);font-size:.82rem">今天還沒有登記功課項目</div>':hwRows)
    +'<div class="add-row"><input id="hwQuick'+ki+'" class="add-inp" placeholder="輸入今天的功課項目..."><button class="add-btn" onclick="addHwItemInline('+ki+',\''+dk+'\')">＋</button></div>'
    +'<div style="padding:8px 12px"><button class="mbtn secondary" style="margin-top:0" onclick="openCalendar('+ki+')">📅 查看月曆／幫今天評分</button></div></div>';

  const secs=[sec0,sec1,sec2,sec3,sec4,sec5,sec6];
  return '<div class="page'+(isActive?' active':'')+'"><div class="reset-bar"><button class="reset-btn" onclick="resetToday()">🔄 重置今日勾選</button></div>'
    +mileHTML
    +'<div class="pts-summary">'
    +'<div class="kid-header-row"><div class="kid-name-lg">'+kid.avatar+' '+kid.name+'</div><div class="kid-pts-lg">'+(pts>=0?'+':'')+pts+'<span style="font-size:1rem;font-weight:700"> 點</span></div></div>'
    +'<div class="util-chip-row">'
      +'<button class="util-chip" onclick="openDiff('+ki+')">🎯 學習難度</button>'
      +'<button class="util-chip" onclick="openManualAdj('+ki+')">🔧 自訂加減分</button>'
    +'</div>'
    +'<div class="quick-adj-row">'
      +[-5,-3,-1,1,3,5].map(v=>'<button class="quick-adj-btn '+(v>0?'plus':'minus')+'" onclick="quickAdj('+ki+','+v+')">'+(v>0?'+':'')+v+'</button>').join('')
    +'</div>'
    +'</div>'
    +secHW
    +innerNav+secs[tab]+'</div>';
}

function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function openModal(html){document.getElementById('modalContent').innerHTML=html; document.getElementById('modalOverlay').style.display='flex';}
function notify(msg){ openModal('<div class="me">💬</div><p style="margin-top:4px">'+escH(msg)+'</p><button class="mbtn primary" onclick="closeModal()">知道了</button>'); }
function closeModal(){document.getElementById('modalOverlay').style.display='none';}
function handleOvClick(e){if(e.target===document.getElementById('modalOverlay')) closeModal();}
function updateLastSave(){const el=document.getElementById('lastSaveTime'); const t=localStorage.getItem('kidsApp_lastSave'); el.textContent=t?'備份時間：'+t:'尚未進行備份';}
function exportData(){ const data={version:7,state}; const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='全能激勵表儲存點_'+state.kids.map(k=>k.name).join('_')+'.json'; a.click(); localStorage.setItem('kidsApp_lastSave',new Date().toLocaleString('zh-TW')); updateLastSave(); notify('備份成功導出，檔案已存到你手機/電腦的「下載」資料夾。');}
function importData(ev){ const file=ev.target.files[0]; if(!file)return; const r=new FileReader(); r.onload=e=>{try{const data=JSON.parse(e.target.result); if(!data.state) throw new Error('檔案毀損或非正常備份檔'); state=data.state; saveState(); renderAll(); notify('🔮 資料成功還原至最新時間點！');}catch(err){notify('無法讀取該檔案：'+err.message);} ev.target.value='';}; r.readAsText(file);}
function confirmReset(){
  openModal('<div class="me">🗑️</div><h2>警告：清除全部資料</h2><p>這將會<strong style="color:var(--coral)">永久清除所有小孩的點數、勾選記錄、卡片與題庫設定</strong>，且無法復原！建議先按「⬇️ 備份導出」存一份 json 檔案再繼續。</p>'
    +'<button class="mbtn danger" onclick="doFactoryReset()">我了解，確定全部清除</button><button class="mbtn secondary" onclick="closeModal()">取消，先不要</button>');
}
function doFactoryReset(){ localStorage.removeItem(SV); location.reload(); }

/* ════ 啟動生命週期 ════ */
(()=>{
  const bg=document.getElementById('starBg'); ['⭐','✨','🎈','🎁','🏆','🌈'].forEach(e=>{const s=document.createElement('div'); s.className='star'; s.textContent=e; s.style.left=Math.random()*100+'%'; s.style.animationDuration=(10+Math.random()*10)+'s'; bg.appendChild(s);});
  setupKidCountUI();
  const saved=ld(SV, null);
  if(saved && saved.kids){
    state=saved;
    if(!state.luckCardsPool) state.luckCardsPool = [...INITIAL_LUCK_CARDS];
    if(!state.punishCardsPool) state.punishCardsPool = [...INITIAL_PUNISH_CARDS];
    if(!state.globalQBank) state.globalQBank = [...QBANK];
    state.kids.forEach(k => {
      if(k.todaysMistakeCount===undefined) k.todaysMistakeCount=0;
      if(k.goodActionCounter===undefined) k.goodActionCounter=0;
      if(k.allActionCounter===undefined) k.allActionCounter=0;
      if(!k.homework) k.homework={};
      if(k.noDefectStreak===undefined) k.noDefectStreak=0;
      if(k.streakBonusAvailable===undefined) k.streakBonusAvailable=false;
      if(!k.gachaLog) k.gachaLog=[];
      if(!k.customSpecial) k.customSpecial=[];
      if(!k.hiddenDefault) k.hiddenDefault=[];
      if(!k.hiddenPenalty) k.hiddenPenalty=[];
      if(k.difficulty>4) k.difficulty=4;
    });
    document.getElementById('setupScreen').style.display='none';
    document.getElementById('mainApp').style.display='block';
    renderAll();
  }
})();
</script>
