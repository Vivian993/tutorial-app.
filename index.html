<style>
  :root{
    --paper:#F6F1E7;
    --paper-warm:#EFE7D8;
    --card:#FCFAF3;
    --ink:#3E3A32;
    --ink-soft:#8B8272;
    --sage:#7C8B6F;
    --sage-deep:#5F6E54;
    --clay:#C19788;
    --clay-deep:#A97764;
    --line:#E1D8C4;
    --shadow: 0 6px 18px rgba(90,80,60,0.10);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 15% 10%, rgba(255,255,255,0.5), transparent 40%),
      var(--paper);
    color:var(--ink);
    font-family: "Noto Serif TC","PMingLiU","Georgia",serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    padding-bottom:60px;
  }
  ::selection{ background:var(--clay); color:#fff; }

  /* ---------- Header ---------- */
  header.app-top{
    padding:28px 20px 14px;
    text-align:center;
    position:relative;
  }
  header.app-top h1{
    font-size:1.5rem;
    font-weight:600;
    letter-spacing:0.12em;
    margin:0 0 4px;
    color:var(--sage-deep);
  }
  header.app-top p{
    margin:0;
    font-size:0.78rem;
    letter-spacing:0.15em;
    color:var(--ink-soft);
  }

  /* ---------- Toolbar ---------- */
  .toolbar{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
    justify-content:center;
    padding:6px 16px 18px;
  }
  .tabs{
    display:flex;
    background:var(--paper-warm);
    border-radius:999px;
    padding:4px;
    gap:2px;
  }
  .tabs button{
    border:none;
    background:transparent;
    padding:7px 16px;
    border-radius:999px;
    font-family:inherit;
    font-size:0.82rem;
    letter-spacing:0.05em;
    color:var(--ink-soft);
    cursor:pointer;
    transition:.2s;
  }
  .tabs button.active{
    background:var(--sage);
    color:#fff;
    box-shadow:var(--shadow);
  }
  .search-box{
    display:flex;
    align-items:center;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:999px;
    padding:6px 14px;
    gap:6px;
    min-width:150px;
  }
  .search-box input{
    border:none;
    outline:none;
    background:transparent;
    font-family:inherit;
    font-size:0.85rem;
    color:var(--ink);
    width:120px;
  }
  .icon-btn{
    border:1px solid var(--line);
    background:var(--card);
    color:var(--sage-deep);
    border-radius:999px;
    padding:7px 14px;
    font-family:inherit;
    font-size:0.82rem;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    gap:5px;
    transition:.2s;
  }
  .icon-btn:hover{ background:var(--paper-warm); }
  .icon-btn.primary{
    background:var(--sage);
    border-color:var(--sage);
    color:#fff;
  }
  .icon-btn.primary:hover{ background:var(--sage-deep); }

  /* ---------- Grid ---------- */
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(150px,1fr));
    gap:18px;
    padding:6px 18px 40px;
    max-width:1000px;
    margin:0 auto;
  }
  .card{
    background:var(--card);
    border-radius:18px;
    overflow:hidden;
    box-shadow:var(--shadow);
    cursor:pointer;
    position:relative;
    transition:transform .25s ease, box-shadow .25s ease;
    border:1px solid var(--line);
  }
  .card:hover{ transform:translateY(-4px); box-shadow:0 12px 24px rgba(90,80,60,0.16); }
  .card .tag{
    position:absolute;
    top:10px; left:10px;
    font-size:0.65rem;
    letter-spacing:0.08em;
    padding:3px 9px;
    border-radius:999px;
    color:#fff;
    z-index:2;
  }
  .tag.game{ background:var(--clay-deep); }
  .tag.general{ background:var(--sage-deep); }
  .card .cover{
    width:100%;
    aspect-ratio:1/1;
    object-fit:cover;
    display:block;
    background:var(--paper-warm);
  }
  .card .info{
    padding:10px 12px 14px;
  }
  .card .info h3{
    margin:0 0 4px;
    font-size:0.95rem;
    line-height:1.3;
  }
  .card .info p{
    margin:0;
    font-size:0.72rem;
    color:var(--ink-soft);
    line-height:1.5;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }

  .empty-state{
    text-align:center;
    padding:70px 20px;
    color:var(--ink-soft);
  }
  .empty-state .mark{ font-size:2.4rem; margin-bottom:10px; }
  .empty-state p{ font-size:0.85rem; line-height:1.8; }

  /* ---------- Overlay (detail / editor) ---------- */
  .overlay{
    position:fixed; inset:0;
    background:var(--paper);
    z-index:50;
    overflow-y:auto;
    display:none;
    animation:fadeUp .25s ease;
  }
  .overlay.show{ display:block; }
  @keyframes fadeUp{
    from{ opacity:0; transform:translateY(14px);}
    to{ opacity:1; transform:translateY(0);}
  }
  .overlay-top{
    position:sticky; top:0;
    background:var(--paper);
    padding:16px 16px 10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid var(--line);
    z-index:2;
  }
  .overlay-body{ padding:18px; max-width:640px; margin:0 auto; }

  .detail-cover{
    width:100%;
    border-radius:16px;
    max-height:340px;
    object-fit:cover;
    box-shadow:var(--shadow);
  }
  .detail-title{ font-size:1.4rem; margin:18px 0 4px; color:var(--sage-deep);}
  .detail-tag{
    display:inline-block;
    font-size:0.7rem;
    letter-spacing:0.08em;
    color:#fff;
    padding:3px 10px;
    border-radius:999px;
    margin-bottom:14px;
  }
  .detail-outline{
    font-size:0.85rem;
    color:var(--ink-soft);
    padding:10px 14px;
    background:var(--paper-warm);
    border-radius:12px;
    margin-bottom:18px;
    line-height:1.7;
  }
  .detail-content{
    font-size:0.95rem;
    line-height:2;
    white-space:pre-wrap;
    word-break:break-word;
  }
  .gallery{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(90px,1fr));
    gap:8px;
    margin-top:18px;
  }
  .gallery img{
    width:100%; aspect-ratio:1/1; object-fit:cover;
    border-radius:10px; cursor:pointer;
    border:1px solid var(--line);
  }
  .detail-actions{
    display:flex; gap:10px; margin-top:26px;
  }
  .detail-actions .icon-btn.danger{
    border-color:#d99a91; color:#a95a4d;
  }

  /* ---------- Form ---------- */
  label.field-label{
    display:block;
    font-size:0.78rem;
    letter-spacing:0.06em;
    color:var(--ink-soft);
    margin:16px 0 6px;
  }
  input[type=text], textarea, select{
    width:100%;
    font-family:inherit;
    font-size:0.9rem;
    padding:10px 12px;
    border-radius:10px;
    border:1px solid var(--line);
    background:var(--card);
    color:var(--ink);
    resize:vertical;
  }
  textarea{ min-height:70px; line-height:1.7; }
  textarea.long{ min-height:160px; }
  input:focus, textarea:focus, select:focus{ outline:2px solid var(--sage); outline-offset:1px;}

  .cover-pick{
    display:flex; gap:14px; align-items:center; margin-top:8px;
  }
  .cover-preview{
    width:88px; height:88px; border-radius:14px;
    object-fit:cover; border:1px solid var(--line); background:var(--paper-warm);
  }
  .hint{ font-size:0.72rem; color:var(--ink-soft); line-height:1.6; margin-top:4px;}

  .gallery-edit{
    display:grid; grid-template-columns:repeat(auto-fill,minmax(80px,1fr));
    gap:8px; margin-top:10px;
  }
  .gallery-edit .thumb{ position:relative; }
  .gallery-edit img{ width:100%; aspect-ratio:1/1; object-fit:cover; border-radius:10px; border:1px solid var(--line);}
  .gallery-edit .rm{
    position:absolute; top:-6px; right:-6px;
    background:var(--clay-deep); color:#fff; border:none;
    width:20px; height:20px; border-radius:50%; font-size:0.7rem; cursor:pointer;
    line-height:20px; text-align:center; padding:0;
  }

  .form-actions{
    display:flex; gap:10px; margin:28px 0 10px;
  }

  .storage-note{
    text-align:center; font-size:0.7rem; color:var(--ink-soft);
    padding:20px 20px 0; letter-spacing:0.03em;
  }

  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:var(--sage-deep); color:#fff; padding:10px 20px;
    border-radius:999px; font-size:0.82rem; letter-spacing:0.04em;
    box-shadow:var(--shadow); z-index:100; opacity:0; pointer-events:none;
    transition:opacity .3s;
  }
  .toast.show{ opacity:1; }

  #importFile{ display:none; }

  @media (max-width:380px){
    .grid{ gap:12px; padding:6px 12px 40px; }
  }
</style>
</head>
<body>

<header class="app-top">

    <span style="width:60px"></span>
  </div>
  <div class="overlay-body">
    <label class="field-label">分類</label>

    </select>

    <label class="field-label">標題</label>
    <input type="text" id="fTitle" placeholder="例如：薩爾達傳說 - 神廟解謎技巧">

      <div>

    <label class="field-label">附加照片（可多張，會自動壓縮）</label>
    <input type="file" id="fGalleryFile" accept="image/*" multiple>
    <div class="gallery-edit" id="galleryEdit"></div>

    <div class="form-actions">
      <button class="icon-btn primary" id="saveBtn" style="flex:1;">儲存</button>
      <button class="icon-btn" id="cancelBtn">取消</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* =================== 資料層 =================== */
const STORAGE_KEY = "healingTutorials_v1";

function loadEntries(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
  }catch(e){ return []; }
}
function saveEntries(list){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
  updateStorageNote();
}
let entries = loadEntries();
if(entries.length === 0){
  entries = seedSamples();
  saveEntries(entries);
}

function seedSamples(){
  return [
    {
      id:"seed1",
      category:"game",
      title:"新手村生存指南",
      outline:"開局資源怎麼分配？先蓋房子還是先種田？三分鐘搞懂優先順序。",
      content:"1. 先確保基本溫飽與住所安全\n2. 探索周邊地圖，標記資源點\n3. 優先升級生產工具而非戰鬥裝備\n4. 保留一定存糧再擴張",
      cover:null, gallery:[], updatedAt:Date.now()
    },
    {
      id:"seed2",
      category:"general",
      title:"手沖咖啡入門筆記",
      outline:"水溫、粉水比、悶蒸時間，記住這三個數字就能穩定沖出好咖啡。",
      content:"粉水比建議 1:15\n水溫 88-92度\n悶蒸 30秒讓咖啡粉充分排氣\n之後分三段緩慢注水，總時間約 2 分半",
      cover:null, gallery:[], updatedAt:Date.now()
    }
  ];
}

function updateStorageNote(){
  const bytes = new Blob([localStorage.getItem(STORAGE_KEY)||""]).size;
  const kb = (bytes/1024).toFixed(0);
  document.getElementById("storageNote").textContent =
    `目前已保存 ${entries.length} 則・佔用約 ${kb} KB（記得定期匯出備份）`;
}

/* =================== 自動封面（依關鍵字） =================== */
const KEYWORD_MAP = [
  [["遊戲","攻略","王國","傳說","任務","副本","裝備"], "🎮", ["#DDD3C4","#B8AE94"]],
  [["咖啡","料理","食譜","煮","烘焙","飲料"], "☕", ["#E7D3B8","#C7A17A"]],
  [["運動","跑步","健身","瑜珈","訓練"], "🏃", ["#CFE0C9","#8FAE85"]],
  [["音樂","樂器","歌","演奏"], "🎵", ["#D8CDE6","#A78FC0"]],
  [["電影","影集","戲劇"], "🎬", ["#D9D2C6","#9B8F7C"]],
  [["書","閱讀","小說","筆記"], "📖", ["#E6DCC6","#BBA97D"]],
  [["旅遊","旅行","景點","機票"], "✈️", ["#CDE1E6","#83AAB4"]],
  [["理財","存錢","投資","記帳"], "💰", ["#E6DFC4","#C2AE72"]],
  [["健康","醫療","保健","睡眠"], "🩺", ["#DCE6DE","#8FAE9A"]],
  [["3C","科技","電腦","軟體","程式"], "💻", ["#D6D9E0","#8F97A8"]],
  [["植物","園藝","花","盆栽"], "🌿", ["#D6E4CB","#7FA06A"]],
];
function hashStr(s){
  let h=0; for(let i=0;i<s.length;i++){ h = (h*31 + s.charCodeAt(i)) >>> 0; }
  return h;
}
function autoCoverDataUrl(title, category){
  title = title || (category==="game" ? "遊戲筆記" : "生活筆記");
  let emoji = category === "game" ? "🎮" : "📝";
  for(const [words, e] of KEYWORD_MAP){
    if(words.some(w => title.includes(w))){ emoji = e; break; }
  }
  const h = hashStr(title);
  const palettes = [
    ["#F3ECDD","#D9CBA9"], ["#E9E3D2","#C9B999"], ["#EFE3DE","#D8B7AC"],
    ["#E4E9DA","#B7C6A3"], ["#E7E1EC","#C1B2D6"], ["#F0E6D8","#D3B98E"]
  ];
  const [c1,c2] = palettes[h % palettes.length];
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400">
    <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="${c1}"/><stop offset="1" stop-color="${c2}"/>
    </linearGradient></defs>
    <rect width="400" height="400" fill="url(#g)"/>
    <text x="50%" y="54%" font-size="140" text-anchor="middle" dominant-baseline="middle">${emoji}</text>
  </svg>`;
  return "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svg)));
}

/* =================== 圖片壓縮 =================== */
function compressImage(file, maxDim=1000, quality=0.68){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let {width, height} = img;
        if(width > height && width > maxDim){ height = Math.round(height*maxDim/width); width = maxDim; }
        else if(height > maxDim){ width = Math.round(width*maxDim/height); height = maxDim; }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* =================== 畫面渲染：卡片列表 =================== */
let activeCat = "all";
let searchTerm = "";

function renderGrid(){
  const grid = document.getElementById("grid");
  const filtered = entries.filter(en=>{
    const catOk = activeCat === "all" || en.category === activeCat;
    const term = searchTerm.trim();
    const searchOk = !term || (en.title+en.outline).toLowerCase().includes(term.toLowerCase());
    return catOk && searchOk;
  }).sort((a,b)=> (b.updatedAt||0)-(a.updatedAt||0));

  if(filtered.length === 0){
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">
      <div class="mark">🌱</div>
      <p>還沒有內容，點右上角「＋ 新增」<br>開始整理你的第一則筆記吧。</p>
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map(en=>{
    const cover = en.cover || autoCoverDataUrl(en.title, en.category);
    const tagLabel = en.category === "game" ? "遊戲" : "一般";
    const tagClass = en.category === "game" ? "game" : "general";
    return `<div class="card" data-id="${en.id}">
      <span class="tag ${tagClass}">${tagLabel}</span>
      <img class="cover" src="${cover}" loading="lazy">
      <div class="info">
        <h3>${escapeHtml(en.title)}</h3>
        <p>${escapeHtml(en.outline||"")}</p>
      </div>
    </div>`;
  }).join("");

  grid.querySelectorAll(".card").forEach(card=>{
    card.addEventListener("click", ()=> openDetail(card.dataset.id));
  });
  updateStorageNote();
}

function escapeHtml(str){
  const d = document.createElement("div");
  d.textContent = str || "";
  return d.innerHTML;
}

document.getElementById("tabs").addEventListener("click", e=>{
  if(e.target.tagName !== "BUTTON") return;
  document.querySelectorAll("#tabs button").forEach(b=>b.classList.remove("active"));
  e.target.classList.add("active");
  activeCat = e.target.dataset.cat;
  renderGrid();
});
document.getElementById("searchInput").addEventListener("input", e=>{
  searchTerm = e.target.value;
  renderGrid();
});

/* =================== 詳細內容 =================== */
let currentDetailId = null;
function openDetail(id){
  const en = entries.find(x=>x.id===id);
  if(!en) return;
  currentDetailId = id;
  const cover = en.cover || autoCoverDataUrl(en.title, en.category);
  const tagLabel = en.category === "game" ? "遊戲" : "一般";
  const tagClass = en.category === "game" ? "game" : "general";
  const gallery = (en.gallery||[]).map(src=>`<img src="${src}">`).join("");

  document.getElementById("detailBody").innerHTML = `
    <img class="detail-cover" src="${cover}">
    <div class="detail-title">${escapeHtml(en.title)}</div>
    <span class="detail-tag ${tagClass==='game'?'tag game':'tag general'}" style="display:inline-block;">${tagLabel}</span>
    <div class="detail-outline">${escapeHtml(en.outline||"")}</div>
    <div class="detail-content">${escapeHtml(en.content||"")}</div>
    ${gallery ? `<div class="gallery">${gallery}</div>` : ""}
  `;
  document.getElementById("detailOverlay").classList.add("show");
}
document.getElementById("detailBack").addEventListener("click", ()=>{
  document.getElementById("detailOverlay").classList.remove("show");
});
document.getElementById("detailDelete").addEventListener("click", ()=>{
  if(!currentDetailId) return;
  if(confirm("確定要刪除這則內容嗎？此動作無法復原。")){
    entries = entries.filter(x=>x.id!==currentDetailId);
    saveEntries(entries);
    renderGrid();
    document.getElementById("detailOverlay").classList.remove("show");
    showToast("已刪除");
  }
});
document.getElementById("detailEdit").addEventListener("click", ()=>{
  if(!currentDetailId) return;
  openEditor(currentDetailId);
  document.getElementById("detailOverlay").classList.remove("show");
});

/* =================== 新增／編輯表單 =================== */
let editingId = null;
let editGallery = [];
let editCover = null;

function openEditor(id){
  editingId = id || null;
  const en = id ? entries.find(x=>x.id===id) : null;

  document.getElementById("editorHeading").textContent = en ? "編輯內容" : "新增內容";
  document.getElementById("fCategory").value = en ? en.category : "game";
  document.getElementById("fTitle").value = en ? en.title : "";
  document.getElementById("fOutline").value = en ? en.outline : "";
  document.getElementById("fContent").value = en ? en.content : "";
  editCover = en ? en.cover : null;
  editGallery = en && en.gallery ? [...en.gallery] : [];
  refreshCoverPreview();
  refreshGalleryEdit();
  document.getElementById("fCoverFile").value = "";
  document.getElementById("fGalleryFile").value = "";
  document.getElementById("editorOverlay").classList.add("show");
}
function refreshCoverPreview(){
  const title = document.getElementById("fTitle").value;
  const cat = document.getElementById("fCategory").value;
  document.getElementById("coverPreview").src = editCover || autoCoverDataUrl(title, cat);
}
function refreshGalleryEdit(){
  const wrap = document.getElementById("galleryEdit");
  wrap.innerHTML = editGallery.map((src,i)=>`
    <div class="thumb">
      <img src="${src}">
      <button class="rm" data-i="${i}">✕</button>
    </div>`).join("");
  wrap.querySelectorAll(".rm").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      editGallery.splice(Number(btn.dataset.i),1);
      refreshGalleryEdit();
    });
  });
}
document.getElementById("fTitle").addEventListener("input", refreshCoverPreview);
document.getElementById("fCategory").addEventListener("change", refreshCoverPreview);

document.getElementById("fCoverFile").addEventListener("change", async e=>{
  const file = e.target.files[0];
  if(!file) return;
  showToast("圖片壓縮中...");
  editCover = await compressImage(file, 900, 0.7);
  refreshCoverPreview();
  showToast("封面已更新");
});
document.getElementById("fGalleryFile").addEventListener("change", async e=>{
  const files = [...e.target.files];
  if(files.length===0) return;
  showToast("圖片壓縮中...");
  for(const f of files){
    const compressed = await compressImage(f, 700, 0.62);
    editGallery.push(compressed);
  }
  refreshGalleryEdit();
  showToast(`已新增 ${files.length} 張照片`);
});

document.getElementById("addBtn").addEventListener("click", ()=> openEditor(null));
document.getElementById("editorBack").addEventListener("click", closeEditor);
document.getElementById("cancelBtn").addEventListener("click", closeEditor);
function closeEditor(){
  document.getElementById("editorOverlay").classList.remove("show");
}

document.getElementById("saveBtn").addEventListener("click", ()=>{
  const title = document.getElementById("fTitle").value.trim();
  if(!title){ alert("請至少輸入標題"); return; }
  const data = {
    id: editingId || ("e"+Date.now()+Math.random().toString(16).slice(2)),
    category: document.getElementById("fCategory").value,
    title,
    outline: document.getElementById("fOutline").value.trim(),
    content: document.getElementById("fContent").value,
    cover: editCover,
    gallery: editGallery,
    updatedAt: Date.now()
  };
  if(editingId){
    entries = entries.map(x=> x.id===editingId ? data : x);
  }else{
    entries.push(data);
  }
  try{
    saveEntries(entries);
  }catch(err){
    alert("儲存失敗，可能是空間不足，請先匯出備份並刪除部分照片。");
    return;
  }
  renderGrid();
  closeEditor();
  showToast("已儲存");
});

/* =================== 匯出／匯入 =================== */
document.getElementById("exportBtn").addEventListener("click", ()=>{
  const blob = new Blob([JSON.stringify(entries, null, 0)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const d = new Date();
  const stamp = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
  a.href = url;
  a.download = `小記事備份_${stamp}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast("已匯出備份檔");
});
document.getElementById("importBtn").addEventListener("click", ()=>{
  document.getElementById("importFile").click();
});
document.getElementById("importFile").addEventListener("change", e=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = evt=>{
    let imported;
    try{ imported = JSON.parse(evt.target.result); }
    catch(err){ alert("檔案格式錯誤，無法匯入。"); return; }
    if(!Array.isArray(imported)){ alert("檔案內容不是有效的備份格式。"); return; }
    const mode = confirm("按「確定」＝合併到現有內容\n按「取消」＝清空後改用匯入的內容");
    if(mode){
      const existingIds = new Set(entries.map(x=>x.id));
      imported.forEach(item=>{
        if(!existingIds.has(item.id)) entries.push(item);
      });
    }else{
      entries = imported;
    }
    saveEntries(entries);
    renderGrid();
    showToast("匯入完成");
  };
  reader.readAsText(file);
  e.target.value = "";
});

/* =================== Toast =================== */
let toastTimer = null;
function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> t.classList.remove("show"), 1800);
}

/* =================== 啟動 =================== */
renderGrid();
</script>
</body>
</html>
